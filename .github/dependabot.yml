version: 2
updates:
  # npm dependencies for the Next.js app
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch patch/minor bumps of runtime and dev deps together so the queue
      # stays manageable — major bumps still open their own PR for review.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Major version upgrades we're deliberately holding back. Remove the
      # corresponding block when we're ready to pick up that major — minor
      # and patch bumps on the current major keep flowing regardless.
      - dependency-name: "typescript"
        versions: ["6.x"]
      - dependency-name: "next"
        versions: ["16.x"]
      - dependency-name: "vitest"
        versions: ["3.x", "4.x"]
      # @types/node's major must match the runtime Node major (node:22-alpine
      # in our Dockerfile). When we bump the Docker base to the next LTS, lift
      # this ignore in the same PR.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"

  # Dockerfile base image bumps
  - package-ecosystem: "docker"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(docker)"
    ignore:
      # Node 22 is the current LTS. Skip odd-number (non-LTS) releases; pick
      # up Node 24 when it lands in LTS.
      - dependency-name: "node"
        versions: ["23-*", "25-*"]
