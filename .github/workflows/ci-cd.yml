name: CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bullmoose-code/vorevault

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm ci

      - name: Test (vitest + testcontainers)
        run: npm run test

      - name: Build (next build)
        run: npm run build

  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger Watchtower on the deployment host
        env:
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN_VAULT }}
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_UPDATE_URL }}
        run: |
          # Retries cover transient reconnects on tunneled endpoints, which
          # otherwise fail the job even when Watchtower's poll picks up the push.
          curl -fS --max-time 30 --retry 5 --retry-all-errors --retry-delay 5 -X POST \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" \
            "$WATCHTOWER_URL"
