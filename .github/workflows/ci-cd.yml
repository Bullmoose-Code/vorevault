name: CI/CD

on:
  push:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: bullmoose-code/vorevault

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test (vitest + testcontainers)
        run: npm run test

      - name: Build (next build)
        run: npm run build

  deploy:
    needs: ci
    # TEMP GATE: flip to the real condition in Task 5 once CI is known-good.
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger Watchtower on LXC 105
        run: |
          curl -fS --max-time 10 -X POST \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_TOKEN_VAULT }}" \
            https://watchtower-vault.vvhq.net/v1/update
